name: invoice-jp
namespace: d6e
version: v1.0.0
description:
  ja-JP: インボイス制度対応の適格請求書・適格簡易請求書・適格返還請求書をPDFとWordで生成・検証するd6e App。
  en-US: Generate and validate Japanese Qualified Invoice, Simplified Qualified Invoice, and Qualified Return Invoice in PDF and DOCX.

template_prompt: |
  あなたは日本の「インボイス制度（適格請求書等保存方式）」に精通した経理担当のアシスタントです。
  ユーザーの依頼に基づいて、以下 3 種類の帳票のいずれかを生成・検証します。

  - `qualified_invoice`（適格請求書）
  - `simplified_invoice`（適格簡易請求書：小売・飲食・タクシー・駐車場・旅行・写真業など）
  - `return_invoice`（適格返還請求書：値引き・返品・割戻しなどで対価を返還した場合）

  ## ツール呼び出しの基本規律（最重要）

  d6e の MCP ツール（`d6e_execute_workflow` / `d6e_instant_run_stf`）は
  **ワークフロー名や STF 名を直接受け取りません**。すべて **UUID（`id` もしくは
  `stf_version_id`）が必須** です。名前文字列を UUID 欄に渡すと JSON-RPC の
  `-32602 Invalid params` エラーになり、同じエラーを繰り返し投げ続けると Slack など
  上流のタイムアウトを招きます（実測 49 回連続で 264 秒タイムアウト発生）。

  インストール直後の本アプリのリソース名は、ワークスペース側で
  **`d6e/invoice-jp/` プレフィックス**が付いた形で登録されます。具体的には:

  - ワークフロー: `d6e/invoice-jp/generate-invoice-pdf`, `d6e/invoice-jp/generate-invoice-docx`
  - STF: `d6e/invoice-jp/validate-qualified-invoice`,
    `d6e/invoice-jp/render-invoice-pdf`, `d6e/invoice-jp/render-invoice-docx`

  プレフィックスを付けない名前で一覧検索してもヒットしません。

  ### リトライ規律

  - 同一パラメータで **2 回続けて同じエラー**が返ったら、自動リトライをやめ、
    ユーザーに日本語でエラー内容と推定原因（UUID 未取得 / アプリ未インストール / 名前ずれ）
    を提示し、手動対応の方針を伺う。3 回以上の自動リトライは禁止。
  - `-32602 Invalid params` が出たら、まず UUID を取得し直してから再試行する。
    `d6e_list_workflows` / `d6e_list_stfs` を呼ばないまま UUID フィールドに名前を入れて
    投げ直してはいけない。

  ## 帳票生成フロー（最重要）

  ユーザーからの入力 JSON が揃ったら、**個別 STF を手動で連結するのではなく、必ず
  本アプリのワークフローを利用**してください。ワークフロー経由なら validate → render の
  payload 受け渡しが決定論的に行われるため、PDF / DOCX の中身が空になったり、ファイル名が
  `undated` に落ちるケースを避けられます。

  ### 手順 1: ワークフロー UUID の解決

  帳票生成系のツールを呼ぶ前に **一度だけ** `d6e_list_workflows` を呼び、応答配列から
  `name === "d6e/invoice-jp/generate-invoice-pdf"` と
  `name === "d6e/invoice-jp/generate-invoice-docx"` の 2 件を探し、
  それぞれの `id`（UUID）を記憶する。見つからない場合は「アプリが未インストール」
  または「アプリ側に本ワークフローが未登録（v1.0.0 未満）」なので、手順 2 のフォールバックに進む。

  ### 手順 2: ワークフロー実行（推奨パス）

  両方（PDF + DOCX）欲しい場合:

  1. **先に** `generate-invoice-pdf` を実行する。
     `d6e_execute_workflow({ id: "<pdf-workflow-uuid>", input: <ユーザーから集めた JSON> })`。
     戻り値が `valid: false` を含む場合（validator がエラーを返したケース）は、
     エラーを日本語で提示してユーザーに修正依頼。勝手に値を補完してはいけない。
  2. 正常終了したら続けて `generate-invoice-docx` を実行する。
     `d6e_execute_workflow({ id: "<docx-workflow-uuid>", input: <同じ JSON> })`。
  3. 各ワークフローの戻り値は `{file_data, file_name}` 形式で、d6e の UI が自動的に
     ダウンロードリンクとして展開する。AI 側で base64 を貼り付け直す必要はない。
     「PDF と DOCX をダウンロード可能な形で生成しました」といった一言に、必要なら
     合計金額のサマリーなど次のアクション提案を添える。

  PDF だけで良い場合は `generate-invoice-pdf` のみ、DOCX だけで良い場合は
  `generate-invoice-docx` のみを呼ぶ。

  ### 手順 3: STF 個別呼び出し（フォールバックのみ）

  ワークフローが存在しない（`d6e_list_workflows` の結果に見当たらない）場合のみ、
  以下の手順で STF を個別に呼ぶ。**`stf_name` というパラメータは存在しない**ことに注意。

  1. `d6e_list_stfs` で `d6e/invoice-jp/validate-qualified-invoice` /
     `d6e/invoice-jp/render-invoice-pdf` / `d6e/invoice-jp/render-invoice-docx` の
     `id` を取得する。
  2. 各 STF について `d6e_list_stf_versions({ stf_id: "<UUID>" })` を呼び、
     最新バージョンの `stf_version_id`（UUID）を得る。
  3. まず validator:
     `d6e_instant_run_stf({ stf_version_id: "<validate-version-uuid>", input: <JSON> })`。
     `valid: false` なら日本語でエラーをユーザー提示、進めない。
  4. `valid: true` なら、returned `normalized_payload` を**そのまま**
     render STF の `$input` として渡す。部分的に抜き出したりキー名を変えたりしない:
     `d6e_instant_run_stf({ stf_version_id: "<render-pdf-version-uuid>", input: normalized_payload })`
     および同様に DOCX 版。

  ## 利用フローの判別

  ユーザーの入力を見て、以下 3 つのモードのうち 1 つを選んでください。

  1. JSON ペーストモード（主運用）
     ユーザーの発言にコードブロックの JSON オブジェクトが含まれている、
     または「この JSON で」「下のデータで作って」と明示された場合。
     その JSON をそのままワークフローの入力として渡してください。
     不足項目や型不一致があった場合は、勝手に値を創作せず必ずユーザーに確認してください。
  2. テンプレ要求モード
     「雛形」「テンプレート」「入力フォーマット」「サンプル JSON」「どんな形で渡せば良い」
     など、フォーマット照会の意図がある場合。
     `invoice-input-template` ファイルの該当 `document_type` ブロック（指定が無ければ
     `qualified_invoice`）を json コードブロックでユーザーに返し、
     「この内容をあなたの情報で編集して貼り戻してください」と案内してください。
  3. 対話フォールバックモード
     JSON の貼り付けもテンプレ要求もなく、自然文で依頼された場合。
     下記「収集すべき項目」を一問一答で聞き、すべて揃ったら JSON にまとめてから
     上記のワークフロー呼び出し手順に進みます。

  ## 収集すべき項目（対話フォールバック時の最小セット）

  以下 6 項目は必須です（簡易インボイスは 7 を任意、返還インボイスは 8 を必須）。

  1. 発行事業者の氏名・名称（`issuer.name`）
  2. 登録番号 (`T` + 13 桁) （`issuer.registration_number`）
  3. 取引年月日（`transaction_date`、`YYYY-MM-DD`）
  4. 明細（`items[].description` / `quantity` / `unit_price`）
  5. 適用税率（`items[].tax_rate` = `0.10` または `0.08`）
  6. 受領事業者の氏名・名称（`recipient.name`）
  7. （簡易の場合）6 は任意
  8. （返還の場合）返還事由と元の請求書番号（`return_info.reason` / `return_info.original_document_number`）

  任意項目: 書類番号 (`document_number`)、会社ロゴ (`issuer.logo`)、
  支払期限・振込先 (`payment.*`)、備考 (`notes`)、税抜／税込の別 (`price_mode`)、
  端数処理 (`rounding_method`)。
  **ファイル名には `document_number` が優先的に使われる**ため、書類番号を指定すると
  `適格請求書_INV-2026-001.pdf` のような分かりやすい名前になります。省略時は取引日、
  それも無ければ `undated` にフォールバックします。

  ## document_type の決め方

  - 何も指定されなければ `qualified_invoice`
  - 「レシート」「小売」「飲食店」「タクシー」「駐車場」「旅行」などの文脈なら `simplified_invoice`
  - 「返品」「値引き」「割戻し」「返還」などが出たら `return_invoice`

  ## 出力時のマナー

  - ユーザーに向けた文章はすべて日本語で記述する。
  - 金額は 3 桁区切りで表示する（例: ¥1,234,567）。
  - 登録番号はチャット本文では `T1234567890123` のように省略せず、帳票上と同じ表記を用いる。
  - 帳票上で軽減税率対象品目があれば `※` マークを付け、「※印は軽減税率対象」と脚注で明記する。
  - インボイス制度や端数処理など制度面の質問は `invoice-requirements-guide` の内容を根拠に答える
    （想像で答えない）。

stfs:
  # NOTE: The three STFs below share the same input payload shape. If you change
  # one input_schema you MUST update the other two to match. They are kept as
  # verbatim copies here (rather than YAML anchors) because the d6e installer
  # pipeline does not guarantee anchor expansion survives all re-serialization
  # stages, and drift would silently break either validation or rendering.

  - name: validate-qualified-invoice
    runtime: js
    description: Validates six mandatory fields, registration number format, and computes per-tax-rate totals for a qualified invoice payload.
    source: stfs/validate-qualified-invoice.js
    input_schema:
      type: object
      required:
        - document_type
        - transaction_date
        - issuer
        - items
      properties:
        document_type:
          type: string
          enum:
            - qualified_invoice
            - simplified_invoice
            - return_invoice
        document_number:
          type: string
        transaction_date:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        issue_date:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        issuer:
          type: object
          required:
            - name
            - registration_number
          properties:
            name:
              type: string
            registration_number:
              type: string
              pattern: "^T\\d{13}$"
            address:
              type: string
            contact:
              type: string
            logo:
              type:
                - object
                - "null"
              properties:
                format:
                  type: string
                  enum: [png, jpg, jpeg]
                data_base64:
                  type: string
        recipient:
          type: object
          properties:
            name:
              type: string
            address:
              type: string
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - description
              - quantity
              - unit_price
              - tax_rate
            properties:
              description:
                type: string
              quantity:
                type: number
              unit_price:
                type: number
              tax_rate:
                type: number
                enum: [0.08, 0.10]
        price_mode:
          type: string
          enum: [tax_excluded, tax_included]
          default: tax_excluded
        rounding_method:
          type: string
          enum: [floor, ceil, round]
          default: floor
        payment:
          type: object
          properties:
            due_date:
              type: string
            bank_info:
              type: string
        notes:
          type: string
        return_info:
          type: object
          properties:
            original_document_number:
              type: string
            return_date:
              type: string
            reason:
              type: string

  - name: render-invoice-pdf
    runtime: js
    description: Renders a validated invoice payload to an A4 PDF with embedded Japanese font. Returns base64 file_data and file_name.
    source: stfs/render-invoice-pdf.js
    # Keep this schema synchronized with validate-qualified-invoice above.
    input_schema:
      type: object
      required:
        - document_type
        - transaction_date
        - issuer
        - items
      properties:
        document_type:
          type: string
          enum:
            - qualified_invoice
            - simplified_invoice
            - return_invoice
        document_number:
          type: string
        transaction_date:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        issue_date:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        issuer:
          type: object
          required:
            - name
            - registration_number
          properties:
            name:
              type: string
            registration_number:
              type: string
              pattern: "^T\\d{13}$"
            address:
              type: string
            contact:
              type: string
            logo:
              type:
                - object
                - "null"
              properties:
                format:
                  type: string
                  enum: [png, jpg, jpeg]
                data_base64:
                  type: string
        recipient:
          type: object
          properties:
            name:
              type: string
            address:
              type: string
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - description
              - quantity
              - unit_price
              - tax_rate
            properties:
              description:
                type: string
              quantity:
                type: number
              unit_price:
                type: number
              tax_rate:
                type: number
                enum: [0.08, 0.10]
        price_mode:
          type: string
          enum: [tax_excluded, tax_included]
          default: tax_excluded
        rounding_method:
          type: string
          enum: [floor, ceil, round]
          default: floor
        payment:
          type: object
          properties:
            due_date:
              type: string
            bank_info:
              type: string
        notes:
          type: string
        return_info:
          type: object
          properties:
            original_document_number:
              type: string
            return_date:
              type: string
            reason:
              type: string
        totals:
          type: object
          description: Pre-computed totals from validate-qualified-invoice. Optional; render STF recomputes if absent.
          properties:
            subtotal_8:
              type: number
            subtotal_10:
              type: number
            subtotal:
              type: number
            tax_8:
              type: number
            tax_10:
              type: number
            tax_total:
              type: number
            grand_total:
              type: number

  - name: render-invoice-docx
    runtime: js
    description: Renders a validated invoice payload to a Word (docx) document using MS Gothic. Returns base64 file_data and file_name.
    source: stfs/render-invoice-docx.js
    # Keep this schema synchronized with validate-qualified-invoice above.
    input_schema:
      type: object
      required:
        - document_type
        - transaction_date
        - issuer
        - items
      properties:
        document_type:
          type: string
          enum:
            - qualified_invoice
            - simplified_invoice
            - return_invoice
        document_number:
          type: string
        transaction_date:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        issue_date:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        issuer:
          type: object
          required:
            - name
            - registration_number
          properties:
            name:
              type: string
            registration_number:
              type: string
              pattern: "^T\\d{13}$"
            address:
              type: string
            contact:
              type: string
            logo:
              type:
                - object
                - "null"
              properties:
                format:
                  type: string
                  enum: [png, jpg, jpeg]
                data_base64:
                  type: string
        recipient:
          type: object
          properties:
            name:
              type: string
            address:
              type: string
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - description
              - quantity
              - unit_price
              - tax_rate
            properties:
              description:
                type: string
              quantity:
                type: number
              unit_price:
                type: number
              tax_rate:
                type: number
                enum: [0.08, 0.10]
        price_mode:
          type: string
          enum: [tax_excluded, tax_included]
          default: tax_excluded
        rounding_method:
          type: string
          enum: [floor, ceil, round]
          default: floor
        payment:
          type: object
          properties:
            due_date:
              type: string
            bank_info:
              type: string
        notes:
          type: string
        return_info:
          type: object
          properties:
            original_document_number:
              type: string
            return_date:
              type: string
            reason:
              type: string
        totals:
          type: object
          description: Pre-computed totals from validate-qualified-invoice. Optional; render STF recomputes if absent.
          properties:
            subtotal_8:
              type: number
            subtotal_10:
              type: number
            subtotal:
              type: number
            tax_8:
              type: number
            tax_10:
              type: number
            tax_total:
              type: number
            grand_total:
              type: number

files:
  - name: invoice-requirements-guide
    description: Reference guide explaining the six mandatory fields, rounding rules, and use cases for each document type.
    path: files/invoice-requirements-guide.md

  - name: tax-rates
    description: Master data of Japanese consumption tax rates (10 percent standard, 8 percent reduced).
    path: files/tax-rates.json

  - name: invoice-input-template
    description: Copy-and-edit JSON input templates for the three document types, containing placeholder values.
    path: files/invoice-input-template.json

workflows:
  # Two separate workflows because d6e workflow return values are limited to the
  # last STF output (see packages/api/src/engine/workflow.rs), and the frontend
  # binary-detection extracts only one file_data per tool result. Exposing one
  # workflow per output format lets the AI call both when the user wants both.

  - name: generate-invoice-pdf
    description: Validates the payload and renders the invoice as a PDF in a single deterministic run. Returns { file_data, file_name } for the PDF.
    stf_steps:
      - stf_name: validate-qualified-invoice
        input_mappings:
          - source: { type: Variable, value: "$input.document_type" }
            target: document_type
          - source: { type: Variable, value: "$input.document_number" }
            target: document_number
          - source: { type: Variable, value: "$input.transaction_date" }
            target: transaction_date
          - source: { type: Variable, value: "$input.issue_date" }
            target: issue_date
          - source: { type: Variable, value: "$input.issuer" }
            target: issuer
          - source: { type: Variable, value: "$input.recipient" }
            target: recipient
          - source: { type: Variable, value: "$input.items" }
            target: items
          - source: { type: Variable, value: "$input.price_mode" }
            target: price_mode
          - source: { type: Variable, value: "$input.rounding_method" }
            target: rounding_method
          - source: { type: Variable, value: "$input.payment" }
            target: payment
          - source: { type: Variable, value: "$input.notes" }
            target: notes
          - source: { type: Variable, value: "$input.return_info" }
            target: return_info
      - stf_name: render-invoice-pdf
        input_mappings:
          - source: { type: Variable, value: "$steps[0].normalized_payload.document_type" }
            target: document_type
          - source: { type: Variable, value: "$steps[0].normalized_payload.document_number" }
            target: document_number
          - source: { type: Variable, value: "$steps[0].normalized_payload.transaction_date" }
            target: transaction_date
          - source: { type: Variable, value: "$steps[0].normalized_payload.issue_date" }
            target: issue_date
          - source: { type: Variable, value: "$steps[0].normalized_payload.issuer" }
            target: issuer
          - source: { type: Variable, value: "$steps[0].normalized_payload.recipient" }
            target: recipient
          - source: { type: Variable, value: "$steps[0].normalized_payload.items" }
            target: items
          - source: { type: Variable, value: "$steps[0].normalized_payload.price_mode" }
            target: price_mode
          - source: { type: Variable, value: "$steps[0].normalized_payload.rounding_method" }
            target: rounding_method
          - source: { type: Variable, value: "$steps[0].normalized_payload.payment" }
            target: payment
          - source: { type: Variable, value: "$steps[0].normalized_payload.notes" }
            target: notes
          - source: { type: Variable, value: "$steps[0].normalized_payload.return_info" }
            target: return_info
          - source: { type: Variable, value: "$steps[0].normalized_payload.totals" }
            target: totals

  - name: generate-invoice-docx
    description: Validates the payload and renders the invoice as a Word (docx) document in a single deterministic run. Returns { file_data, file_name } for the DOCX.
    stf_steps:
      - stf_name: validate-qualified-invoice
        input_mappings:
          - source: { type: Variable, value: "$input.document_type" }
            target: document_type
          - source: { type: Variable, value: "$input.document_number" }
            target: document_number
          - source: { type: Variable, value: "$input.transaction_date" }
            target: transaction_date
          - source: { type: Variable, value: "$input.issue_date" }
            target: issue_date
          - source: { type: Variable, value: "$input.issuer" }
            target: issuer
          - source: { type: Variable, value: "$input.recipient" }
            target: recipient
          - source: { type: Variable, value: "$input.items" }
            target: items
          - source: { type: Variable, value: "$input.price_mode" }
            target: price_mode
          - source: { type: Variable, value: "$input.rounding_method" }
            target: rounding_method
          - source: { type: Variable, value: "$input.payment" }
            target: payment
          - source: { type: Variable, value: "$input.notes" }
            target: notes
          - source: { type: Variable, value: "$input.return_info" }
            target: return_info
      - stf_name: render-invoice-docx
        input_mappings:
          - source: { type: Variable, value: "$steps[0].normalized_payload.document_type" }
            target: document_type
          - source: { type: Variable, value: "$steps[0].normalized_payload.document_number" }
            target: document_number
